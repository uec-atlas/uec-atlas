id: uas:people
name: uec_atlas_people
title: "UEC Atlas People Ontology"

prefixes:
  uao: https://uec-atlas.org/ontology/
  uar: https://uec-atlas.org/resources/
  uas: https://uec-atlas.org/schema/

imports:
  - common

default_prefix: uao

classes:
  Person:
    is_a: NamedThingWithId
    description: "人"
    slot_usage:
      id:
        pattern: "^uar:people/"
    attributes:
      memberOf:
        description: "所属組織"
        range: OrganizationBase
        multivalued: true
        slot_uri: schema:memberOf
      isBasedOn:
        description: "情報源"
        range: uriorcurie
        slot_uri: schema:isBasedOn
