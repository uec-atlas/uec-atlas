id: uas:people
name: uec_atlas_people
title: "UEC Atlas People Ontology"

prefixes:
  uao: https://uec-atlas.org/ontology/
  uar: https://uec-atlas.org/resources/
  uas: https://uec-atlas.org/schema/

imports:
  - common

default_prefix: uao

classes:
  Person:
    is_a: PersonBase
    description: "人"
    slots:
      - memberOf
    slot_usage:
      id:
        pattern: "^uar:people/"
      name:
        mixins:
          - foafName
    attributes:
      isBasedOn:
        description: "情報源"
        range: uriorcurie
        slot_uri: schema:isBasedOn

slots:
  foafName:
    slot_uri: foaf:name
